<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所属変更｜Gakuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-page="transfers">
  <div class="app">
    <div id="shell-header"></div>
    <div class="body">
      <div id="shell-sidebar"></div>
      <main class="main"><div class="main__scroll"><div class="page" id="page"></div></div></main>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/shell.js"></script>
  <script>
    let tab = "approve"; // approve | mine | scheduled | history
    function tbadge(s){
      const m={pending:['b-warn','承認待ち'],approved:['b-info','承認済（予約）'],cancelled:['b-gray','取消済'],done:['b-ok','反映済']};
      const [c,l]=m[s]||m.pending; return `<span class="badge-s ${c}">${l}</span>`;
    }
    function render(){
      const pending = TRANSFER_REQS.filter(t=>t.status==='pending');
      const scheduled = TRANSFER_REQS.filter(t=>t.status==='approved'&&t.scheduled);
      let list = TRANSFER_REQS;
      if(tab==='approve') list = pending;
      if(tab==='scheduled') list = scheduled;
      if(tab==='history') list = TRANSFER_REQS.filter(t=>t.status==='cancelled');

      const rows = list.map(t=>`
        <tr>
          <td><div class="person-cell"><div class="avatar">${t.person.slice(0,1)}</div><div><b>${t.person}</b><span>${t.id}</span></div></div></td>
          <td><div class="flex items-center gap-8" style="font-size:12.5px"><span class="muted">${t.from}</span>${icon('arrowRight',14,'muted')}<b>${t.to}</b></div></td>
          <td style="font-family:var(--font-num)">${t.effective}</td>
          <td>${tbadge(t.status)}</td>
          <td class="muted">${t.requester}</td>
          <td onclick="event.stopPropagation()">${actions(t)}</td>
        </tr>`).join('') || `<tr><td colspan="6"><div class="empty">${icon('inbox',32)}<div>該当する申請はありません</div></div></td></tr>`;

      document.getElementById('page').innerHTML = `
        <div class="crumb"><a href="index.html">ダッシュボード</a><span class="sep">/</span><span>所属変更</span></div>
        <div class="page-head">
          <div class="page-head__icon" style="background:linear-gradient(135deg,#f59e0b,#b45309)">${icon('swap',24)}</div>
          <div><h1>所属変更</h1><p>異動は承認制です。承認後、適用日にバッチ処理で自動反映されます。適用前なら取消可能。権限保有者はCSVで承認不要の直接変更も可能です。</p></div>
          <div class="page-head__actions"><button class="btn btn-primary" onclick="openNew()">${icon('plus',16)} 変更を申請</button></div>
        </div>

        <div class="alert info mb-16"><span class="ai">${icon('clock',16)}</span><div><b>承認フローの流れ</b>申請 → 変更先組織が承認 → 適用日にバッチ自動反映。例：A校の先生がB校へ申請 → B校が承認 → 7/1にXさんがB校所属へ。</div></div>

        <div class="tabs">
          <button class="tab ${tab==='approve'?'active':''}" onclick="tab='approve';render()">承認待ち <span class="cnt">${pending.length}</span></button>
          <button class="tab ${tab==='scheduled'?'active':''}" onclick="tab='scheduled';render()">予約中（承認済） <span class="cnt">${scheduled.length}</span></button>
          <button class="tab ${tab==='mine'?'active':''}" onclick="tab='mine';render()">すべて <span class="cnt">${TRANSFER_REQS.length}</span></button>
          <button class="tab ${tab==='history'?'active':''}" onclick="tab='history';render()">取消・履歴</button>
        </div>

        <div class="card"><div class="card__body flush table-wrap">
          <table class="tbl"><thead><tr><th>対象者</th><th>異動（変更前 → 変更後）</th><th>適用日</th><th>状態</th><th>申請者</th><th style="width:180px">操作</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div></div>
      `;
    }
    function actions(t){
      if(t.status==='pending') return `<button class="btn btn-success btn-sm" onclick="approve('${t.id}','${t.person}')">${icon('check',13)} 承認</button> <button class="btn btn-secondary btn-sm" onclick="reject('${t.person}')">差戻し</button>`;
      if(t.status==='approved'&&t.scheduled) return `<span class="badge-s b-info" style="margin-right:6px">${t.effective} 反映予定</span><button class="btn btn-danger btn-sm" onclick="cancel('${t.id}','${t.person}')">${icon('x',13)} 取消</button>`;
      return `<span class="muted" style="font-size:12px">—</span>`;
    }
    function approve(id,person){
      modalShell({ title:"異動を承認しますか？", sub:`${person} の所属変更を承認します`, icon:"check", iconBg:"var(--ok-50)", iconColor:"var(--ok-700)",
        body:`<div class="alert ok"><span class="ai">${icon('clock',16)}</span><div>承認後は<b>予約状態</b>になり、適用日にバッチ処理で自動反映されます。適用日前であれば取消できます。</div></div>`,
        foot:`<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn btn-success" onclick="toast('${person} の異動を承認しました（予約）','ok');closeModal()">${icon('check',16)} 承認する</button>` });
    }
    function reject(person){ toast(person+' の申請を差し戻しました','info'); }
    function cancel(id,person){
      modalShell({ title:"予約を取り消しますか？", sub:`${person} の異動予約を取り消します`, icon:"alert", iconBg:"var(--err-50)", iconColor:"var(--err-600)",
        body:`<div class="alert warn"><span class="ai">${icon('alert',16)}</span><div>バッチ処理による反映前のため取消できます。取り消すと所属は変更されません。</div></div>`,
        foot:`<button class="btn btn-secondary" onclick="closeModal()">戻る</button><button class="btn btn-danger" onclick="toast('異動予約を取り消しました','info');closeModal()">${icon('x',16)} 取り消す</button>` });
    }
    function openNew(){
      modalShell({ title:"所属変更を申請", sub:"変更先組織の承認後、適用日に自動反映されます", icon:"swap", iconBg:"var(--warn-50)", iconColor:"var(--warn-600)",
        body:`
          <div class="form-row"><label>対象者<span class="req">*</span></label><select class="input">${PEOPLE.map(p=>`<option>${p.name}（${p.org}）</option>`).join('')}</select></div>
          <div class="grid grid-2">
            <div class="form-row"><label>変更後の所属<span class="req">*</span></label><select class="input"><option>緑川町立中央小学校</option><option>青葉市立桜丘小学校</option></select></div>
            <div class="form-row"><label>適用日<span class="req">*</span></label><input class="input" type="date" value="2026-07-01"></div>
          </div>
          <div class="form-row"><label>申請理由</label><textarea class="textarea" placeholder="人事異動のため など"></textarea></div>`,
        foot:`<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" onclick="toast('変更先へ申請を送信しました','ok');closeModal()">${icon('send',16)} 申請を送信</button>` });
    }
    render();
  </script>
</body>
</html>
