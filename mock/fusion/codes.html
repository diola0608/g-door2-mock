<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コードマスター｜Gakuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-page="codes">
  <div class="app">
    <div id="shell-header"></div>
    <div class="body">
      <div id="shell-sidebar"></div>
      <main class="main"><div class="main__scroll"><div class="page" id="page"></div></div></main>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/shell.js"></script>
  <script>
    let activeMaster = CODE_MASTERS[1].id; // PERSON_TRAIT を初期表示（権限制限の例）
    function render(){
      const m = CODE_MASTERS.find(x=>x.id===activeMaster);
      const list = CODE_MASTERS.map(c=>`
        <button class="tree-row ${c.id===activeMaster?'active':''}" style="width:100%;text-align:left" onclick="activeMaster='${c.id}';render()">
          ${icon('code',15)}<span style="font-weight:700">${c.name}</span>
          ${c.restricted?`<span class="badge-s b-warn" style="margin-left:6px">${icon('lock',10)}</span>`:''}
          <span class="count">${c.codes.length}</span>
        </button>`).join('');

      const codeRows = m.codes.map(c=>`
        <tr>
          <td><b style="font-family:var(--font-num)">${c.code}</b></td>
          <td><b>${c.label}</b></td>
          <td>${c.restricted?`<span class="badge-s b-err">${icon('lock',11)} 制限</span>`:'<span class="badge-s b-ok">公開</span>'}</td>
          <td class="muted">${c.visibleTo?`表示可：${c.visibleTo}`:'全ロール'}</td>
          <td><button class="icon-btn" style="width:30px;height:30px" onclick="openCode('${c.code}','${c.label}',${c.restricted})">${icon('shield',15)}</button></td>
        </tr>`).join('');

      document.getElementById('page').innerHTML = `
        <div class="crumb"><a href="index.html">ダッシュボード</a><span class="sep">/</span><span>設定</span><span class="sep">/</span><span>コードマスター</span></div>
        <div class="page-head">
          <div class="page-head__icon" style="background:linear-gradient(135deg,#3b62e8,#283fa8)">${icon('code',24)}</div>
          <div><h1>コードマスター</h1><p>属性項目「コード」形式の選択肢を一元管理。各コードに権限制限をかけ、特定ロールにのみ表示できます。</p></div>
          <div class="page-head__actions"><button class="btn btn-primary" onclick="openAddMaster()">${icon('plus',16)} マスターを追加</button></div>
        </div>

        <div style="display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start">
          <div class="card"><div class="card__head" style="padding:14px 16px">${icon('list',16)}<h3 style="font-size:13px">マスター一覧</h3></div>
            <div class="card__body" style="padding:8px">${list}</div></div>

          <div class="card">
            <div class="card__head">
              ${icon('code',18)}<h3>${m.name}</h3><span class="sub">${m.id}</span>
              ${m.restricted?`<span class="badge-s b-warn">${icon('lock',11)} 権限制限あり</span>`:''}
              <div class="right"><button class="btn btn-secondary btn-sm" onclick="openAddCode()">${icon('plus',14)} コードを追加</button></div>
            </div>
            <div class="card__body flush table-wrap">
              <table class="tbl">
                <thead><tr><th style="width:80px">コード</th><th>ラベル</th><th>公開状態</th><th>表示可能ロール</th><th style="width:50px"></th></tr></thead>
                <tbody>${codeRows}</tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="alert info mt-16"><span class="ai">${icon('shield',16)}</span><div><b>コード単位の権限制限</b>例：「人物の特徴」マスターの<b>いじめ加害者</b>コードは<b>学年主任のみ</b>に選択肢として表示。被害者・加害者など機微なコードを役割で出し分けできます。</div></div>
      `;
    }

    function openCode(code,label,restricted){
      modalShell({ title:`コード「${label}」の権限`, sub:`コード ${code} を表示できるロール・条件を設定`, icon:"shield", iconBg:"var(--warn-50)", iconColor:"var(--warn-600)",
        body:`
          <div class="scope-row" style="justify-content:space-between;margin-bottom:14px"><div><b>このコードに権限制限をかける</b><div class="hint" style="margin-top:2px">OFFにすると全ロールに表示されます</div></div>
            <label class="switch"><input type="checkbox" ${restricted?'checked':''}><span class="track"></span></label></div>
          <div class="form-row"><label>選択肢として表示できるロール</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${["一般教員","学年主任","校長","教育委員会管理者"].map((r,i)=>`<label class="tag" style="cursor:pointer"><input type="checkbox" class="checkbox" ${(restricted? i>=1 : true)?'checked':''}> ${r}</label>`).join('')}
            </div>
            <div class="hint">チェックしたロールにのみ、この選択肢が表示・設定可能になります。</div>
          </div>
          <div class="form-row"><label>追加スコープ条件（任意）</label>
            <div class="scope-row"><span class="lbl">条件</span><span class="cond-pill">所属校が一致</span><span class="cond-op">AND</span><span class="cond-pill">担任である</span></div>
          </div>`,
        foot:`<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" onclick="toast('コードの権限を保存しました','ok');closeModal()">${icon('check',16)} 保存</button>` });
    }
    function openAddCode(){
      modalShell({ title:"コードを追加", icon:"plus",
        body:`<div class="grid grid-2"><div class="form-row"><label>コード値<span class="req">*</span></label><input class="input" placeholder="PT04"></div><div class="form-row"><label>ラベル<span class="req">*</span></label><input class="input" placeholder="例：要支援"></div></div>
          <div class="scope-row" style="justify-content:space-between"><div><b>権限制限をかける</b></div><label class="switch"><input type="checkbox"><span class="track"></span></label></div>`,
        foot:`<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" onclick="toast('コードを追加しました','ok');closeModal()">${icon('check',16)} 追加</button>` });
    }
    function openAddMaster(){
      modalShell({ title:"コードマスターを追加", icon:"code",
        body:`<div class="form-row"><label>マスターID<span class="req">*</span></label><input class="input" placeholder="例：DISABILITY"></div><div class="form-row"><label>名称<span class="req">*</span></label><input class="input" placeholder="例：配慮事項"></div>`,
        foot:`<button class="btn btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn btn-primary" onclick="toast('マスターを追加しました','ok');closeModal()">${icon('check',16)} 追加</button>` });
    }
    render();
  </script>
</body>
</html>
