<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コードマスター | 静岡県教育委員会 統合管理システム</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="codes">
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <main id="main" class="content">
    <div class="breadcrumbs">
      <a href="index.html">ホーム</a>
      <span class="icon" data-icon="chevron-right"></span>
      <span>コードマスター</span>
    </div>

    <div class="page-header">
      <div>
        <h1 class="page-title">コードマスター</h1>
        <p class="page-subtitle">属性項目で使用する選択肢を管理します。選択肢ごとに権限による表示制限をかけられます</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('modal-code-create')"><span class="icon" data-icon="plus"></span> コード追加</button>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="tabs" id="code-tabs">
          <button class="tab active" data-tab="all">すべて</button>
          <button class="tab" data-tab="club">部活動</button>
          <button class="tab" data-tab="feature">人物の特徴</button>
          <button class="tab" data-tab="bully">いじめ区分</button>
          <button class="tab" data-tab="sex">性別</button>
        </div>
        <div class="code-list" id="code-list"></div>
      </div>
    </div>

  </main>

  <div class="modal-overlay" id="modal-code-create">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title"><span class="icon" data-icon="plus"></span> コード追加</h3>
        <button class="modal-close" onclick="closeModal('modal-code-create')"><span class="icon" data-icon="x"></span></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">コードグループ</label>
            <select class="form-select"><option>部活動</option><option>人物の特徴</option><option>いじめ区分</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">コード値</label>
            <input type="text" class="form-input" placeholder="例：railway">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">表示ラベル</label>
          <input type="text" class="form-input" placeholder="例：鉄道研究部">
        </div>
        <div class="form-group">
          <label class="form-label">表示制限（オプション）</label>
          <select class="form-select">
            <option>制限なし</option>
            <option>学年主任のみ</option>
            <option>校長・教頭のみ</option>
            <option>特定属性を持つユーザーのみ</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-code-create')">キャンセル</button>
        <button class="btn btn-primary" onclick="closeModal('modal-code-create'); showToast('コードを追加しました（モック）','success')">保存</button>
      </div>
    </div>
  </div>

  <script>
    window.init_codes = function() {
      const container = document.getElementById('code-list');
      function render(group) {
        container.innerHTML = '';
        const codes = MOCK_DATA.codes.filter(c => group === 'all' || c.group === group);
        codes.forEach(c => {
          container.insertAdjacentHTML('beforeend', `
            <div class="code-item">
              <div>
                <div style="font-weight:700">${escapeHtml(c.label)}</div>
                <div style="font-size:.8rem;color:var(--color-text-muted)">${escapeHtml(c.group)} / ${escapeHtml(c.value)}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                ${c.restriction ? `<span class="tag tag-danger">${escapeHtml(c.restriction)}</span>` : '<span class="tag">制限なし</span>'}
                <button class="btn btn-ghost btn-sm" onclick="openModal('modal-code-create')">編集</button>
              </div>
            </div>
          `);
        });
      }
      document.getElementById('code-tabs').addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (!btn) return;
        document.querySelectorAll('#code-tabs .tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.tab);
      });
      render('all');
    };
  </script>
</body>
</html>
