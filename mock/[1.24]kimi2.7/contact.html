<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問い合わせ | 静岡県教育委員会 統合管理システム</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="contact">
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <main id="main" class="content">
    <div class="breadcrumbs">
      <a href="index.html">ホーム</a>
      <span class="icon" data-icon="chevron-right"></span>
      <span>問い合わせ</span>
    </div>

    <div class="page-header">
      <div>
        <h1 class="page-title">管理者への問い合わせ</h1>
        <p class="page-subtitle">CSVインポートや同期で発生したエラーを報告したり、運用に関する質問を送信できます</p>
      </div>
    </div>

    <div class="grid grid-3" style="align-items:start">
      <div class="card" style="grid-column:span 2">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon"><span class="icon" data-icon="message-circle"></span></span>問い合わせフォーム</h3>
        </div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">問い合わせ種別 <span class="required">*</span></label>
              <select class="form-select" id="contact-type">
                <option>エラー報告</option>
                <option>操作方法</option>
                <option>権限について</option>
                <option>その他</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">関連する処理ログ</label>
              <select class="form-select" id="contact-log">
                <option value="">選択しない</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">件名 <span class="required">*</span></label>
            <input type="text" class="form-input" id="contact-subject" placeholder="件名を入力">
          </div>
          <div class="form-group">
            <label class="form-label">内容 <span class="required">*</span></label>
            <textarea class="form-textarea" id="contact-body" rows="6" placeholder="できるだけ詳細に記入してください"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">添付ファイル</label>
            <div class="upload-zone" style="padding:24px">
              <div class="upload-zone-title">エラー時のスクリーンショットなどを添付</div>
              <div class="upload-zone-hint">PNG, JPG, PDF（最大10MB）</div>
            </div>
          </div>
          <div class="form-actions" style="border:none;padding:0;margin-top:8px">
            <a href="index.html" class="btn btn-secondary">キャンセル</a>
            <button class="btn btn-primary" onclick="submitContact()"><span class="icon" data-icon="send"></span> 送信</button>
          </div>
        </div>
      </div>

      <div class="card" style="align-self:start">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon"><span class="icon" data-icon="alert-triangle"></span></span>最近のエラー</h3>
        </div>
        <div class="card-body" id="recent-errors"></div>
      </div>
    </div>

  </main>

  <script>
    window.init_contact = function() {
      const logSelect = document.getElementById('contact-log');
      MOCK_DATA.logs.filter(l => l.status === 'エラー').forEach(l => {
        logSelect.insertAdjacentHTML('beforeend', `<option value="${l.id}">${escapeHtml(l.date)} ${escapeHtml(l.title)}</option>`);
      });

      const errorWrap = document.getElementById('recent-errors');
      MOCK_DATA.logs.filter(l => l.status === 'エラー').forEach(l => {
        errorWrap.insertAdjacentHTML('beforeend', `
          <div class="notification-item" style="cursor:pointer" onclick="prefillError('${l.id}')">
            <div class="notification-icon error"><span class="icon" data-icon="alert-triangle"></span></div>
            <div>
              <div class="notification-title">${escapeHtml(l.title)}</div>
              <div class="notification-body">${escapeHtml(l.message)}</div>
              <div class="notification-meta">${escapeHtml(l.date)}</div>
            </div>
          </div>
        `);
      });

      const params = new URLSearchParams(location.search);
      const logId = params.get('log');
      if (logId) prefillError(logId);

      window.prefillError = function(id) {
        const l = MOCK_DATA.logs.find(x => x.id === id);
        if (!l) return;
        document.getElementById('contact-type').value = 'エラー報告';
        document.getElementById('contact-log').value = id;
        document.getElementById('contact-subject').value = '【エラー】' + l.title;
        document.getElementById('contact-body').value = '発生日時：' + l.date + '\n' + l.message + '\n\n詳細：';
      };

      window.submitContact = function() {
        if (!document.getElementById('contact-subject').value || !document.getElementById('contact-body').value) {
          showToast('件名と内容を入力してください', 'warning');
          return;
        }
        showToast('問い合わせを送信しました。担当者からの回答をお待ちください。', 'success');
        setTimeout(() => location.href = 'index.html', 1500);
      };
    };
  </script>
</body>
</html>
