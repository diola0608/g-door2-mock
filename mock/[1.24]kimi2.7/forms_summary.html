<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォーム集計 | 静岡県教育委員会 統合管理システム</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="forms_summary">
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <main id="main" class="content">
    <div class="breadcrumbs">
      <a href="index.html">ホーム</a>
      <span class="icon" data-icon="chevron-right"></span>
      <a href="forms_list.html">フォーム一覧</a>
      <span class="icon" data-icon="chevron-right"></span>
      <span>集計結果</span>
    </div>

    <div class="page-header">
      <div>
        <h1 class="page-title" id="form-title">--</h1>
        <p class="page-subtitle" id="form-desc"></p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" onclick="showToast('集計をExcelでエクスポートしました（モック）','info')"><span class="icon" data-icon="download"></span> エクスポート</button>
        <a href="forms_answer.html" class="btn btn-primary"><span class="icon" data-icon="plus"></span> 回答を追加</a>
      </div>
    </div>

    <div class="grid grid-4">
      <div class="card stat-card">
        <div><div class="stat-label">回答数</div><div class="stat-value" id="stat-responses">0</div></div>
        <div class="stat-icon primary"><span class="icon" data-icon="file-text"></span></div>
      </div>
      <div class="card stat-card">
        <div><div class="stat-label">対象数</div><div class="stat-value" id="stat-target">0</div></div>
        <div class="stat-icon teal"><span class="icon" data-icon="users"></span></div>
      </div>
      <div class="card stat-card">
        <div><div class="stat-label">回答率</div><div class="stat-value" id="stat-rate">0%</div></div>
        <div class="stat-icon accent"><span class="icon" data-icon="check"></span></div>
      </div>
      <div class="card stat-card">
        <div><div class="stat-label">未回答</div><div class="stat-value" id="stat-remaining">0</div></div>
        <div class="stat-icon" style="background:#f1f5f9;color:#475569"><span class="icon" data-icon="bell"></span></div>
      </div>
    </div>

    <div class="grid grid-2" style="align-items:start">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon"><span class="icon" data-icon="layout"></span></span>集計グラフ</h3>
        </div>
        <div class="card-body">
          <div class="bar-chart" id="summary-chart"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon"><span class="icon" data-icon="users"></span></span>名簿連携状況</h3>
        </div>
        <div class="card-body">
          <p style="margin:0 0 14px;font-size:.9rem;color:var(--color-text-secondary)">回答内容は、以下の属性項目に自動反映されます。</p>
          <div class="code-list" id="mapping-list"></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:24px">
      <div class="card-header">
        <h3 class="card-title"><span class="card-title-icon"><span class="icon" data-icon="file-text"></span></span>個別回答</h3>
      </div>
      <div class="card-body table-wrap">
        <table class="table" id="response-table">
          <thead>
            <tr>
              <th>回答日時</th>
              <th>氏名</th>
              <th>所属</th>
              <th>回答内容</th>
              <th>反映状態</th>
            </tr>
          </thead>
          <tbody><!-- JS --></tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    window.init_forms_summary = function() {
      const params = new URLSearchParams(location.search);
      const fid = params.get('id') || 'f001';
      const f = MOCK_DATA.forms.find(x => x.id === fid) || MOCK_DATA.forms[0];
      document.getElementById('form-title').textContent = f.title;
      document.getElementById('form-desc').textContent = f.description;
      document.getElementById('stat-responses').textContent = f.responseCount;
      document.getElementById('stat-target').textContent = f.totalCount || '--';
      const rate = f.totalCount ? Math.round(f.responseCount / f.totalCount * 100) : 0;
      document.getElementById('stat-rate').textContent = rate + '%';
      document.getElementById('stat-remaining').textContent = (f.totalCount ? f.totalCount - f.responseCount : 0);

      // チャート
      const chartData = [
        { label: '回答済み', value: f.responseCount },
        { label: '未回答', value: f.totalCount - f.responseCount }
      ];
      const max = Math.max(...chartData.map(d => d.value), 1);
      const chart = document.getElementById('summary-chart');
      chart.innerHTML = chartData.map(d => `
        <div class="bar-row">
          <div class="bar-label">${escapeHtml(d.label)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.value / max * 100)}%"></div></div>
          <div class="bar-value">${d.value}件</div>
        </div>
      `).join('');

      // マッピング
      const mapContainer = document.getElementById('mapping-list');
      if (f.canMapToRoster && Object.keys(f.mapping).length) {
        Object.entries(f.mapping).forEach(([k, v]) => {
          const attr = findAttribute ? findAttribute(v) : null;
          mapContainer.insertAdjacentHTML('beforeend', `
            <div class="code-item">
              <div>
                <div style="font-weight:700">${escapeHtml(k)}</div>
                <div style="font-size:.8rem;color:var(--color-text-muted)">→ ${attr ? escapeHtml(attr.name) : escapeHtml(v)}</div>
              </div>
              <span class="tag tag-primary">反映済み</span>
            </div>
          `);
        });
      } else {
        mapContainer.innerHTML = '<p class="form-hint">このフォームは名簿連携がありません</p>';
      }

      // 個別回答テーブル（ダミー）
      const tbody = document.querySelector('#response-table tbody');
      const reps = Math.min(f.responseCount, 5);
      for (let i = 0; i < reps; i++) {
        const p = MOCK_DATA.people[i % MOCK_DATA.people.length];
        const sampleAnswer = fid === 'f002' ? '1.2台 / AP 12台' : (fid === 'f003' ? '対人関係' : '090-1234-56' + (70 + i));
        tbody.insertAdjacentHTML('beforeend', `
          <tr>
            <td>2026-06-${String(10+i).padStart(2,'0')} 10:${String(12+i).padStart(2,'0')}</td>
            <td><a href="roster_detail.html?id=${p.id}">${escapeHtml(p.name)}</a></td>
            <td>${escapeHtml(getOrgName(p.orgId))}</td>
            <td>${escapeHtml(sampleAnswer)}</td>
            <td><span class="status-badge status-success">反映済み</span></td>
          </tr>
        `);
      }
    };
  </script>
</body>
</html>
