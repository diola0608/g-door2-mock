<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フォーム作成 - EduConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="app"></div>

  <div class="modal-overlay" id="roster-link-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>名簿連携の設定</h2>
        <button class="modal-close" data-modal-close>&times;</button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.9rem;color:var(--color-gray-600);margin-bottom:16px">フォームの回答を名簿の属性項目に自動反映します。</p>
        <div class="form-group">
          <label class="form-label">フォーム項目</label>
          <select class="form-select"><option selected>自家用携帯番号</option></select>
        </div>
        <div style="text-align:center;padding:8px;color:var(--color-gray-400)">↓ 反映先</div>
        <div class="form-group">
          <label class="form-label">名簿の属性項目</label>
          <select class="form-select"><option selected>携帯電話（連絡先情報）</option></select>
        </div>
        <div class="form-check"><input type="checkbox" checked> 回答と同時に名簿を更新する</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal-close>キャンセル</button>
        <button class="btn btn-primary" data-modal-close onclick="showToast('名簿連携を設定しました')">設定</button>
      </div>
    </div>
  </div>

  <script src="../js/icons.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/app.js"></script>
  <script>
    initLayout('forms', 'form-builder');
    setPageContent(`
      <div class="page-header">
        <div class="breadcrumb">
          <a href="../index.html">ホーム</a> ${Icons.chevronRight}
          <a href="forms-list.html">フォーム</a> ${Icons.chevronRight} 作成
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <h1>フォーム作成</h1>
            <p>質問項目・対象者・名簿連携・閲覧権限を設定します。</p>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="showToast('下書きを保存しました')">下書き保存</button>
            <button class="btn btn-primary" onclick="showToast('フォームを公開しました')">公開</button>
          </div>
        </div>
      </div>

      <div class="two-pane" style="grid-template-columns:1fr 320px">
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="card-header"><h3>基本設定</h3></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">フォーム名</label>
                <input class="form-input" value="自家用携帯番号登録">
              </div>
              <div class="form-group">
                <label class="form-label">説明</label>
                <textarea class="form-textarea">教員全員の自家用携帯番号を登録してください。緊急時の連絡に使用します。</textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">回答期限</label>
                  <input class="form-input" type="date" value="2026-06-15">
                </div>
                <div class="form-group">
                  <label class="form-label">対象者</label>
                  <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:2px" onclick="showToast('対象者選択（モック）')">△△市 小学校 一般教員（248名）</button>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between">
              <h3>質問項目</h3>
              <button class="btn btn-secondary btn-sm">${Icons.plus} 項目追加</button>
            </div>
            <div class="card-body">
              <div class="form-field-item">
                <span class="form-field-drag">⠿</span>
                <div class="form-field-info">
                  <div class="field-label">メールアドレス</div>
                  <div class="field-type">テキスト（自動入力・名簿から取得）</div>
                </div>
                <span class="badge-tag blue">識別子</span>
              </div>
              <div class="form-field-item">
                <span class="form-field-drag">⠿</span>
                <div class="form-field-info">
                  <div class="field-label">自家用携帯番号</div>
                  <div class="field-type">電話番号 · 必須</div>
                </div>
                <button class="btn btn-ghost btn-sm" data-modal-open="roster-link-modal">${Icons.layers} 名簿連携</button>
              </div>
              <div class="form-field-item">
                <span class="form-field-drag">⠿</span>
                <div class="form-field-info">
                  <div class="field-label">緊急連絡先（任意）</div>
                  <div class="field-type">テキスト</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div class="card">
            <div class="card-header"><h3>プレビュー</h3></div>
            <div class="card-body" style="background:var(--color-gray-50)">
              <h4 style="font-size:1rem;margin-bottom:4px">自家用携帯番号登録</h4>
              <p style="font-size:0.8rem;color:var(--color-gray-500);margin-bottom:16px">教員全員の自家用携帯番号を登録してください。</p>
              <div class="form-group">
                <label class="form-label">メールアドレス</label>
                <input class="form-input" value="t.yamada@edu.example.jp" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">自家用携帯番号 <span style="color:var(--color-danger)">*</span></label>
                <input class="form-input" placeholder="090-1234-5678">
              </div>
              <div class="form-group">
                <label class="form-label">緊急連絡先（任意）</label>
                <input class="form-input" placeholder="">
              </div>
              <button class="btn btn-primary" style="width:100%" disabled>回答する</button>
            </div>
          </div>
          <div class="card" style="margin-top:16px">
            <div class="card-header"><h3>閲覧権限</h3></div>
            <div class="card-body" style="font-size:0.85rem">
              <p style="color:var(--color-gray-500);margin-bottom:8px">集計結果の閲覧権限</p>
              <div class="form-check"><input type="checkbox" checked> フォーム作成者</div>
              <div class="form-check"><input type="checkbox" checked> 教育委員会 学務課</div>
              <div class="form-check"><input type="checkbox"> 校長（対象校のみ）</div>
              <a href="permissions.html" style="font-size:0.8rem;margin-top:8px;display:inline-block">詳細な権限設定 →</a>
            </div>
          </div>
        </div>
      </div>
    `);
  </script>
</body>
</html>
