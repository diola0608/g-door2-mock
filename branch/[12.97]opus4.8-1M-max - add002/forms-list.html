<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フォーム | EduConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="forms-list">
  <main id="main" class="main">
    <div class="page page--wide">
      <div class="breadcrumb"><a href="index.html">ホーム</a><span class="sep">/</span><span class="cur">フォーム</span></div>
      <div class="page-head">
        <div class="page-head__main">
          <h1 class="page-title"><span class="ico-tile violet" style="width:38px;height:38px"><i data-ic="forms" data-size="20"></i></span> フォーム</h1>
          <p class="page-subtitle">アンケート・調査を作成。対象を権限で絞り、回答を名簿へ自動反映できます。</p>
        </div>
        <div class="page-head__actions"><a class="btn btn--primary" href="forms-builder.html"><i data-ic="plus" data-size="16"></i> フォームを作成</a></div>
      </div>

      <div class="grid grid-4 mb-20">
        <div class="stat"><div class="stat__top"><span class="stat__ico ico-tile success"><i data-ic="send"></i></span><span class="stat__label">受付中</span></div><div class="stat__value">3</div></div>
        <div class="stat"><div class="stat__top"><span class="stat__ico ico-tile warning"><i data-ic="pieChart"></i></span><span class="stat__label">集計中</span></div><div class="stat__value">1</div></div>
        <div class="stat"><div class="stat__top"><span class="stat__ico ico-tile brand"><i data-ic="listChecks"></i></span><span class="stat__label">総回答数</span></div><div class="stat__value">3,249</div></div>
        <div class="stat"><div class="stat__top"><span class="stat__ico ico-tile teal"><i data-ic="link"></i></span><span class="stat__label">名簿連携フォーム</span></div><div class="stat__value">2</div></div>
      </div>

      <div class="flex items-center mb-16">
        <div class="pills" data-pill-group><span class="pill active">すべて</span><span class="pill">受付中</span><span class="pill">集計中</span><span class="pill">終了</span><span class="pill">下書き</span></div>
        <div class="input-icon spacer" style="width:240px"><i data-ic="search" data-size="16"></i><input class="input btn--sm" style="height:34px" placeholder="フォームを検索" /></div>
      </div>

      <div class="grid grid-3" id="formGrid"></div>
    </div>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      var I = window.icon, F = window.DATA.forms, U = window.UI;
      document.getElementById('formGrid').innerHTML = F.map(function (f) {
        var pct = f.total ? Math.round(f.responses / f.total * 100) : 0;
        var go = f.status === '下書き' ? 'forms-builder.html' : 'forms-results.html';
        return '<a class="card clickable" href="' + go + '" style="display:flex;flex-direction:column">' +
          '<div class="card__body" style="flex:1">' +
            '<div class="flex items-center justify-between mb-12">' + U.statusBadge(f.status) + (f.linked ? '<span class="badge badge--teal"><i data-ic="link" data-size="12"></i> 名簿連携</span>' : '<span class="text-3">' + I('moreV', { size: 16 }) + '</span>') + '</div>' +
            '<div class="fw-7" style="font-size:15.5px;line-height:1.4">' + f.title + '</div>' +
            '<div class="text-3 text-sm mt-8 flex items-center gap-6">' + I('users', { size: 14 }) + ' ' + f.target + '</div>' +
            (f.total ? '<div class="mt-16"><div class="flex items-center justify-between mb-4"><span class="text-sm fw-6">回答 ' + f.responses.toLocaleString() + ' / ' + f.total.toLocaleString() + '</span><span class="text-sm fw-7" style="color:var(--brand-600)">' + pct + '%</span></div><div class="progress"><div class="progress__bar" style="width:' + pct + '%"></div></div></div>' : '<div class="mt-16 text-3 text-sm">未配信</div>') +
          '</div>' +
          '<div class="card__foot" style="border-radius:0 0 var(--r-lg) var(--r-lg)"><span class="flex items-center gap-8 text-sm text-2">' + U.avatar(f.owner, { size: 'xs' }) + ' ' + f.owner + '</span><span class="text-3 text-sm spacer">' + (f.due === '—' ? '期限なし' : '〆 ' + f.due) + '</span></div>' +
          '</a>';
      }).join('');
      // add "create" tile
      document.getElementById('formGrid').insertAdjacentHTML('beforeend',
        '<a class="card clickable" href="forms-builder.html" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-style:dashed;color:var(--text-3);min-height:200px">' + I('plus', { size: 28 }) + '<span class="fw-6">新しいフォームを作成</span></a>');
      window.hydrateIcons(document.getElementById('formGrid'));
    })();
  </script>
</body>
</html>
